desafioDevops:
  replicas: 1
  namespace: desafioDevops-dev
  namespace:
    create: true
  image: .dkr.ecr.us-east-1.amazonaws.com/desafio-devops:development-e8e5d8d
  imagePullPolicy: Always
  port: 3000
  imagePullSecrets:
    - name: ecr-secret
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  probes:
    enabled: true
    path: /health
    startup:
      failureThreshold: 180
      periodSeconds: 1
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    liveness:
      initialDelaySeconds: 180
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
  ingress:
    path: /desafioDevops(/|$)(.*)
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
# External Secrets Operator Configuration
externalSecret:
  enabled: true
  refreshInterval: 5m
  secretStoreName: aws-secrets-store-dev
  targetSecretName: db-credentials
  remoteKeys:
    host: desafioDevops-dev/host
    user: desafioDevops-dev/user
    password: desafioDevops-dev/password
    database: desafioDevops-dev/database
# SecretStore Configuration (AWS Secrets Manager)
secretStore:
  enabled: true
  name: aws-secrets-store-dev
  provider: aws
  aws:
    region: us-east-1
    serviceAccountName: external-secrets-sa
