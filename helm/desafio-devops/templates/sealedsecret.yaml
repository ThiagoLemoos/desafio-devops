{{- if .Values.sealedSecret.enabled }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.sealedSecret.name }}
  namespace: {{ .Values.sealedSecret.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  encryptedData:
    # The encrypted data will be generated using kubeseal
    # Example: kubectl create secret generic db-credentials --from-literal=MYSQL_HOST=value --from-literal=MYSQL_USER=value --from-literal=MYSQL_PASSWORD=value --from-literal=MYSQL_DATABASE=value --dry-run=client -o yaml | kubeseal --format yaml > sealedsecret.yaml
    MYSQL_HOST: {{ .Values.sealedSecret.encryptedData.MYSQL_HOST | quote }}
    MYSQL_USER: {{ .Values.sealedSecret.encryptedData.MYSQL_USER | quote }}
    MYSQL_PASSWORD: {{ .Values.sealedSecret.encryptedData.MYSQL_PASSWORD | quote }}
    MYSQL_DATABASE: {{ .Values.sealedSecret.encryptedData.MYSQL_DATABASE | quote }}
  template:
    type: Opaque
    metadata:
      name: {{ .Values.sealedSecret.name }}
      namespace: {{ .Values.sealedSecret.namespace }}
{{- end }}
